        /* ===== LOADING OVERLAY ===== */

            position: fixed;

        /* Duplicate Firebase config block removed – initialization is already handled earlier */
        const IMGBB_KEY = '6549c97f02c79d56e102920b1a1a0586';

        async function uploadToImgBB(file) {
            if (!file) return null;
            const formData = new FormData();
            formData.append('image', file);
            try {

                if (data.success) return data.data.url;

        window.dbSet = function(path, data) {
            if (!firebaseReady || !fbDB) return Promise.reject("Firebase not ready");
            const clean = deepClean(data);
            return fbDB.ref(path).set(clean);
        };

        window.dbUpdate = function(path, data) {
            if (!firebaseReady || !fbDB) return Promise.reject("Firebase not ready");
            const clean = deepClean(data);
            return fbDB.ref(path).update(clean);
        };

        window.dbPush = function(path, data) {
            if (!firebaseReady || !fbDB) return Promise.reject("Firebase not ready");
            const clean = deepClean(data);
            const newRef = fbDB.ref(path).push();
            return newRef.set(clean).then(() => newRef.key);
        };

        // Hàm save cũ (vẫn giữ để tương thích nhưng sẽ hạn chế dùng root set)
        let _saveTimeout = null;
        function save() {
            if (!firebaseReady || !fbRef) return;
            clearTimeout(_saveTimeout);
            _saveTimeout = setTimeout(() => _saveInternal(), 500);
        }

        function saveNow() {
            if (!firebaseReady || !fbRef) return Promise.reject("Firebase not ready");
            clearTimeout(_saveTimeout);
            return _saveInternal();
        }

        function _saveInternal() {
            if (!window.firebaseReady || !window.fbRef) return Promise.reject("Firebase not ready");
            window._isSaving = true;
            
            const encodedUsers = {};
            for (const [email, u] of Object.entries(window.DB.users)) {
                if (email && u) encodedUsers[encodeEmail(email)] = u;
            }
            
            const dataToSave = deepClean({ ...window.DB, users: encodedUsers });
            console.log("📤 [Firebase] Đang ghi root DB...");
            
            return window.fbRef.set(dataToSave)
                .then(() => {
                    setTimeout(() => { window._isSaving = false; }, 1000);
                })
                .catch(err => {
                    console.error("❌ Root Save Error:", err);
                    window._isSaving = false;
                    throw err;
                });
        }

        function deepClean(obj) {
            if (obj === null || obj === undefined) return null;
            if (Array.isArray(obj)) return obj.map(deepClean).filter(v => v !== undefined);
            if (typeof obj === 'object') {
                const out = {};
                for (const [k, v] of Object.entries(obj)) {
                    if (v !== undefined && typeof v !== 'function') {
                        out[k] = deepClean(v);
                    }
                }
                return out;
            }
            return obj;
        }

                            window.DB[key] = data[key];

                    if (data.users) {

                        }
                        window.DB.users = decodedUsers;
                    }
                    console.log("📦 [Firebase] Dữ liệu đã tải xong.");
                }
            } catch (err) {
                console.error('loadInitialData error:', err);
                // Nếu lỗi permission denied, có thể do chưa đăng nhập nhưng Rules yêu cầu auth
                // Chúng ta vẫn cho ứng dụng chạy với DB mặc định

        function findUserByLoginLocal(login) {

        function findEmailByLoginLocal(login) {
            const k = normalizeLogin(login);

            const base = (u?.username || email.split('@')[0] || 'USER').replace(/[^a-z0-9]/gi, '').toUpperCase().slice(0, 8) || 'USER';
            const tail = String(Math.abs((email.length * 97) % 10000)).padStart(4, '0');

        window.buyProduct = function (id) {
            const u = user(); if (!u) return notify('Vui lòng đăng nhập.', 'error');
            const pIdx = (DB.products || []).findIndex(x => String(x.id) === String(id)); 
            if (pIdx === -1) return;
            const p = DB.products[pIdx];

            if (safeNum(p.stock) <= 0) return notify('Sản phẩm hết hàng.', 'error');
            
            // Hỏi mã giảm giá (Voucher)
            const vCode = prompt(`Bạn có mã giảm giá không? (Bỏ trống nếu không có)`, '');
            let discount = 0;
            if (vCode && vCode.trim()) {
                const v = (DB.vouchers || []).find(x => x.code === vCode.trim().toUpperCase() && x.active);
                if (v) {
                    discount = safeNum(v.amount);
                    notify(`✅ Đã áp dụng mã giảm giá: -${discount.toLocaleString()}đ`);
                } else {
                    notify('❌ Mã giảm giá không tồn tại hoặc đã hết hạn.', 'error');
                }
            }

            const finalPrice = Math.max(0, safeNum(p.price) - discount);
            if (safeNum(u.balance) < finalPrice) return notify('Số dư không đủ để thanh toán.', 'error');

            const encoded = encodeEmail(currentEmail());
            const updates = {};
            updates[`users/${encoded}/balance`] = safeNum(u.balance) - finalPrice;
            updates[`products/${pIdx}/stock`] = Math.max(0, safeNum(p.stock) - 1);
            updates[`products/${pIdx}/sold`] = safeNum(p.sold) + 1;
            
            const historyItem = { 
                name: p.name, 
                price: finalPrice, 
                originalPrice: p.price,
                voucherUsed: discount > 0 ? vCode.toUpperCase() : null,
                link: p.link || '', 
                image: p.image || '', 
                category: p.category || '', 
                date: now() 
            };
            
            dbUpdate('/', updates)
                .then(() => dbPush(`users/${encoded}/purchaseHistory`, historyItem))
                .then(() => {
                    notify(`Mua "${p.name}" thành công!`); 
                    navigate('profile');
                })
                .catch(err => notify('Lỗi Firebase: ' + err.message, 'error'));
        };

        function buffHTML(platform, icon, types) {
            return `<div class="form-panel">
    <h2><i class="bi bi-${icon}"></i> Buff ${platform}</h2>
    <div class="form-group"><label>Loại</label>
      <select id="buffType-${icon}">${types.map(t => `<option>${esc(t)}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Link</label><input type="url" id="buffLink-${icon}" placeholder="Dán link..." required></div>
    <div class="form-group"><label>Số lượng</label><input type="number" id="buffQty-${icon}" value="1000" min="100" oninput="updateBuffPrice('${icon}','${platform}')"></div>
    <div class="price-display">Giá: <span id="priceDisplay-${icon}">0đ</span></div>
    <button class="btn btn-primary btn-block" onclick="submitBuff('${icon}','${platform}')"><i class="bi bi-send"></i> Gửi đơn</button>
  </div>`;
        }
        function attachBuff(page, container) { const icon = page.replace('buff-', ''); const platform = icon; updateBuffPrice(icon, platform); const sel = $(`#buffType-${icon}`, container); if (sel) sel.onchange = () => updateBuffPrice(icon, platform); }
        function updateBuffPrice(icon, platform) { const typeEl = $(`#buffType-${icon}`); const qtyEl = $(`#buffQty-${icon}`); const displayEl = $(`#priceDisplay-${icon}`); if (!typeEl || !qtyEl || !displayEl) return; const price = calcBuffPrice(platform, typeEl.value, parseInt(qtyEl.value || '0', 10)); displayEl.textContent = price.toLocaleString() + 'đ'; }
        window.submitBuff = function (icon, platform) {
            const u = user(); if (!u) return notify('Vui lòng đăng nhập.', 'error');
            const type = $(`#buffType-${icon}`).value;
            const link = $(`#buffLink-${icon}`).value.trim();
            const qty = parseInt($(`#buffQty-${icon}`).value || '0', 10);
            if (!link || qty < 100) return notify('Nhập đầy đủ thông tin.', 'error');
            const price = calcBuffPrice(platform, type, qty);
            DB.orders = DB.orders || [];
            DB.orders.push({ id: uid(), service: 'Buff ' + platform, type, link, qty, price, userEmail: currentEmail(), status: 'pending', date: now() });
            u.serviceHistory = u.serviceHistory || [];
            u.serviceHistory.push({ type: 'Buff ' + platform, detail: type, link, qty, price, date: now() });
            save(); log('buff_order', `${platform} ${type} ${qty}`); notify(`Đơn Buff ${platform} đã gửi! Giá: ${price.toLocaleString()}đ`); navigate('profile');
        };

        function walletHTML() {
            const u = user() || {}; const email = currentEmail();
            const tx = [];
            Object.values(u.walletNotes || {}).forEach(n => tx.push({ ...n, amount: safeNum(n.amount) }));
            Object.values(u.depositRequests || {}).filter(r => r.status === 'approved').forEach(r => tx.push({ id: r.id, time: r.date || now(), title: 'Nạp tiền duyệt', detail: r.note || '', amount: safeNum(r.amount) }));
            Object.values(u.purchaseHistory || {}).forEach(p => tx.push({ id: uid(), time: p.date || now(), title: `Mua: ${p.name || '?'}`, detail: '', amount: -safeNum(p.price) }));
            tx.sort((a, b) => new Date(b.time).getTime() - new Date(a.time).getTime());
            const totalIn = tx.filter(x => x.amount > 0).reduce((s, x) => s + x.amount, 0);
            const totalOut = tx.filter(x => x.amount < 0).reduce((s, x) => s + Math.abs(x.amount), 0);
            return `
  <div class="hero" style="padding:28px 22px;margin-bottom:18px;text-align:left"><h1>Ví của tôi</h1></div>
  <div class="wallet-grid">
    <div class="wallet-card"><div style="color:var(--muted);font-size:.84rem">Số dư</div><div class="wallet-amount" style="color:#86efac">${safeNum(u.balance).toLocaleString()}đ</div></div>
    <div class="wallet-card"><div style="color:var(--muted);font-size:.84rem">Đã nhận</div><div class="wallet-amount">${totalIn.toLocaleString()}đ</div></div>
    <div class="wallet-card"><div style="color:var(--muted);font-size:.84rem">Đã chi</div><div class="wallet-amount" style="color:#fca5a5">${totalOut.toLocaleString()}đ</div></div>
  </div>
  <div class="split" style="margin-top:18px">
    <div class="glass-panel">
      <h3>Chuyển tiền</h3>
      <form id="walletTransferForm">
        <div class="form-group"><label>Người nhận</label><input id="transferTo" placeholder="Email hoặc tên đăng nhập" required></div>
        <div class="form-group"><label>Số tiền</label><input id="transferAmount" type="number" min="1000" required></div>
        <div class="form-group"><label>Ghi chú</label><input id="transferNote" placeholder="Nội dung..."></div>
        <button class="btn btn-primary btn-block"><i class="bi bi-send"></i> Chuyển tiền</button>
      </form>
    </div>
    <div class="glass-panel">
      <h3>Voucher</h3>
      <form id="voucherForm">
        <div class="form-group"><label>Mã voucher</label><input id="voucherCode" placeholder="MMO2026" required></div>
        <button class="btn btn-primary btn-block"><i class="bi bi-gift"></i> Đổi voucher</button>
      </form>
      <div style="margin-top:14px;color:var(--muted);font-size:.86rem">Voucher hợp lệ sẽ cộng thẳng vào số dư.</div>
    </div>
  </div>
  <div class="glass-panel" style="margin-top:18px">
    <div class="toolbar" style="justify-content:space-between"><h3 style="margin:0">Lịch sử giao dịch</h3><span class="badge badge-blue">${tx.length} mục</span></div>
    <div class="tx-list">
      ${tx.map(item => `<div class="tx-item">
        <div><b>${esc(item.title || '')}</b><div><small style="color:var(--muted)">${esc(item.detail || '—')}</small></div>
          <div><small style="color:var(--muted)">${new Date(item.time || now()).toLocaleString('vi-VN')}</small></div>
        </div>
        <div class="tx-amount" style="color:${item.amount < 0 ? '#fca5a5' : '#86efac'}">${item.amount >= 0 ? '+' : ''}${safeNum(item.amount).toLocaleString()}đ</div>
      </div>`).join('') || '<p>Chưa có giao dịch.</p>'}
    </div>
  </div>`;
        }

        function rankingHTML() {
            const members = Object.entries(DB.users || {}).map(([email, u]) => ({ email, name: u.name || email, balance: safeNum(u.balance), buys: Object.values(u.purchaseHistory || {}).length })).sort((a, b) => b.balance - a.balance);
            return `
  <div class="hero" style="padding:28px 22px;margin-bottom:18px;text-align:left"><h1>Bảng xếp hạng</h1></div>
  <div class="leader-grid">
    ${members.slice(0, 12).map((m, i) => `<div class="leader-card">
      <div class="toolbar" style="justify-content:space-between">
        <div><b>#${i + 1} ${esc(m.name)}</b><div style="color:var(--muted);font-size:.8rem">${esc(m.email)}</div></div>
        <span class="badge badge-${i === 0 ? 'amber' : i === 1 ? 'blue' : 'green'}">${m.balance.toLocaleString()}đ</span>
      </div>
      <div style="margin-top:10px"><span class="badge badge-blue">${m.buys} giao dịch</span></div>

        function adminPlaceholderHTML() {
            return `<div class="glass-panel"><p>Vui lòng đợi, đang tải module bảo mật...</p></div>`;
        }

        function loadAdmin(c) { }

        /* Admin actions */

        /* ============================================================
           WALLET ACTIONS
           ============================================================ */
        window.transferWallet = function (to, amount, note = '') {
            const me = user(); if (!me) return notify('Vui lòng đăng nhập.', 'error');
            const value = safeNum(amount); if (value <= 0) return notify('Số tiền không hợp lệ.', 'error');
            if (safeNum(me.balance) < value) return notify('Số dư không đủ.', 'error');
            const targetEmail = findEmailByLoginLocal(to);
            if (!targetEmail) return notify('Không tìm thấy người nhận.', 'error');
            if (targetEmail === currentEmail()) return notify('Không thể chuyển cho chính mình.', 'error');
            const receiver = DB.users[targetEmail]; if (!receiver) return notify('Người dùng không tồn tại.', 'error');
            me.balance -= value; receiver.balance = safeNum(receiver.balance) + value;
            me.walletNotes = me.walletNotes || [];
            me.walletNotes.unshift({ id: uid(), time: now(), kind: 'transfer', title: `Chuyển tiền cho ${receiver.name || targetEmail}`, detail: note || '—', amount: -value });
            receiver.walletNotes = receiver.walletNotes || [];
            receiver.walletNotes.unshift({ id: uid(), time: now(), kind: 'transfer', title: `Nhận tiền từ ${me.name || currentEmail()}`, detail: note || '—', amount: value });
            save(); updateUI(); notify('Chuyển tiền thành công!'); navigate('wallet');
        };

        window.redeemVoucher = function (code) {
            const me = user(); if (!me) return notify('Vui lòng đăng nhập.', 'error');
            const clean = (code || '').trim().toUpperCase();
            const voucher = (DB.vouchers || []).find(v => v.code.toUpperCase() === clean && v.active !== false);
            if (!voucher) return notify('Voucher không hợp lệ.', 'error');
            voucher.usedBy = ensureArray(voucher.usedBy);
            if (voucher.usedBy.includes(currentEmail())) return notify('Bạn đã dùng voucher này rồi.', 'error');
            voucher.usedBy.push(currentEmail());
            me.balance = safeNum(me.balance) + safeNum(voucher.amount);
            me.walletNotes = me.walletNotes || [];
            me.walletNotes.unshift({ id: uid(), time: now(), kind: 'voucher', title: `Đổi voucher ${voucher.code}`, detail: voucher.note || '', amount: safeNum(voucher.amount) });
            save(); updateUI(); notify(`Đã nhận ${safeNum(voucher.amount).toLocaleString()}đ từ voucher!`); navigate('wallet');
        };

        /* ============================================================
           MODAL
           ============================================================ */
        function openModal(title, bodyHTML, onReady) {
            const modal = $('#appModal'); const titleEl = $('#modalTitle'); const bodyEl = $('#modalBody');
            if (!modal || !titleEl || !bodyEl) return;
            titleEl.textContent = title || ''; bodyEl.innerHTML = bodyHTML || '';
            modal.classList.remove('hidden'); modal.setAttribute('aria-hidden', 'false');
            requestAnimationFrame(() => { if (typeof onReady === 'function') onReady(bodyEl); });
        }
        function closeModal() {
            const modal = $('#appModal'); if (!modal) return;
            modal.classList.add('hidden'); modal.setAttribute('aria-hidden', 'true');
            const bodyEl = $('#modalBody'); if (bodyEl) bodyEl.innerHTML = '';
        }

        /* ============================================================
           BOT
           ============================================================ */
        let botMessages = [];
        let botState = { open: false, scope: 'site', productId: null };
        function setBotContext(scope = 'site', productId = null) { botState.scope = scope; botState.productId = productId; const ctx = $('#botContextText'); if (ctx) ctx.textContent = botState.productId ? `Sản phẩm: ${(DB.products || []).find(p => p.id === productId)?.name || productId}` : 'Hỗ trợ toàn website'; renderBotSuggestions(); }

        function renderBotMessages() {
            const win = $('#botMessages'); if (!win) return;
            if (!botMessages.length) botMessages.push({ role: 'bot', text: 'Xin chào, mình là Dat Dev. Mình có thể hỗ trợ về sản phẩm và các mục trên website.', time: now() });
            win.innerHTML = botMessages.map(m => `<div class="bot-row ${m.role === 'user' ? 'mine' : ''}">
    ${m.role === 'bot' ? '<div class="avatar-sm">D</div>' : ''}
    <div class="bot-bubble">${esc(m.text)}
      <div style="font-size:.72rem;color:var(--muted);margin-top:5px">${m.role === 'bot' ? 'Dat Dev' : 'Bạn'}</div>
    </div>
    ${m.role === 'user' ? `<div class="avatar-sm">${esc((user()?.name || 'U').charAt(0).toUpperCase())}</div>` : ''}
  </div>`).join('');
            win.scrollTop = win.scrollHeight;
            renderBotSuggestions();
        }
        function renderBotSuggestions() { const box = $('#botSuggestions'); if (!box) return; const suggestions = ['Xem sản phẩm', 'Nạp tiền', 'Điểm danh', 'Buff Facebook', 'Liên hệ']; box.innerHTML = suggestions.map(t => `<button class="bot-chip" onclick="sendBotSuggestion('${esc(t)}')">${esc(t)}</button>`).join(''); }
        function askDatDev(text) { if (!text.trim()) return; botMessages.push({ role: 'user', text, time: now() }); botMessages.push({ role: 'bot', text: botAnswer(text), time: now() }); renderBotMessages(); }
        function botAnswer(rawText) { const t = rawText.toLowerCase(); const p = botState.productId ? (DB.products || []).find(x => x.id === botState.productId) : null; if (p) { if (/giá|bao nhiêu/.test(t)) return `${p.name} giá ${safeNum(p.price).toLocaleString()}đ.`; if (/còn|tồn|hàng/.test(t)) return safeNum(p.stock) > 0 ? `Còn ${safeNum(p.stock)} trong kho.` : 'Hết hàng.'; return `${p.name}: ${safeNum(p.price).toLocaleString()}đ, kho: ${safeNum(p.stock)}.`; } if (/sản phẩm/.test(t)) return 'Vào mục Sản phẩm để xem.'; if (/nạp tiền/.test(t)) return 'Vào Dashboard → Nạp tiền để gửi yêu cầu.'; if (/điểm danh/.test(t)) return 'Vào Dashboard → Điểm danh ngay.'; if (/buff/.test(t)) return 'Có dịch vụ buff Facebook, TikTok, Telegram ở thanh menu bên trái.'; return 'Mình có thể hỗ trợ về sản phẩm, nạp tiền, buff và các tính năng trên website.'; }
        window.sendBotSuggestion = function (text) { const input = $('#botInput'); if (input) input.value = text; askDatDev(text); if (input) input.value = ''; };
        window.sendDatDevMessage = function () { const input = $('#botInput'); if (!input) return; const text = input.value.trim(); if (!text) return; askDatDev(text); input.value = ''; };

        /* ============================================================
           ============================================================ */
        document.addEventListener('submit', async e => {
            if (e.target.id === 'loginForm') {
                e.preventDefault();
                const loginStr = $('#loginEmail').value.trim();
                const pw = $('#loginPass').value.trim();

                if (!loginStr || !pw) return notify('Vui lòng nhập đầy đủ.', 'error');

                // Find email if username was provided
                let email = loginStr;
                if (!loginStr.includes('@')) {
                    email = findEmailByLoginLocal(loginStr);
                    if (!email) return notify('Không tìm thấy tài khoản.', 'error');
                }

                try {
                    setLoaderMsg('Đang xác thực...');
                    const cred = await firebase.auth().signInWithEmailAndPassword(email, pw);
                    currentUserEmail = cred.user.email;
                    updateUI();
                    notify('Đăng nhập thành công!', 'success');
                    navigate('dashboard');
                } catch (err) {
                    notify('Lỗi: ' + err.message, 'error');
                }
            }
            // ========== REGISTER - ĐÃ CHỈNH SỬA KIỂM TRA EMAIL TỒN TẠI ==========
            if (e.target.id === 'registerForm') {
                e.preventDefault();
                const name = $('#regName').value.trim();
                const email = $('#regEmail').value.trim().toLowerCase();
                const username = $('#regUsername').value.trim();
                const pw = $('#regPass').value;
                const pw2 = $('#regPass2').value;

                if (!name || !email || !username || !pw) return notify('Vui lòng điền đủ.', 'error');
                if (pw !== pw2) return notify('Mật khẩu không khớp.', 'error');
                if (isUsernameTaken(username)) return notify('Tên đăng nhập đã tồn tại.', 'error');

                try {
                    setLoaderMsg('Đang tạo tài khoản...');
                    const cred = await firebase.auth().createUserWithEmailAndPassword(email, pw);
                    currentUserEmail = cred.user.email;
                    
                    const newUser = {
                        name, username, password: pw, avatar: '', cover: '', tick: false, 
                        role: 'member', 
                        level: 'Member',
                        balance: 0, 
                        bio: '', 
                        joined: now(), purchaseHistory: [], depositRequests: [], serviceHistory: [],
                        studioUsage: { date: '', removeCount: 0 }, missionsClaimed: {}, walletNotes: [],
                        referralCode: makeReferralCode(email, { username })
                    };

                    // Save to Firebase
                    await fbRef.child('users').child(encodeEmail(email)).set(newUser);
                    DB.users[email] = newUser;
                    
                    notify('Đăng ký thành công!', 'success');
                    navigate('dashboard');
                } catch (err) {
                    notify('Lỗi: ' + err.message, 'error');
                }
            }

            // Các form khác giữ nguyên
            if (e.target.id === 'postForm') {
                e.preventDefault();
                if (!currentEmail()) return notify('Vui lòng đăng nhập.', 'error');
                const title = $('#postTitle').value.trim();
                const content = $('#postContent').value.trim();
                const image = $('#postImage')?.value.trim() || '';
                DB.posts = DB.posts || [];
                DB.posts.unshift({ id: uid(), authorEmail: currentEmail(), title, content, image, status: 'approved', timestamp: now() });
                save(); log('create_post', title); notify('Đã đăng bài.');
                if ($('#postForm')) $('#postForm').reset();
                loadPosts(document.getElementById('page-community'));
            }

            if (e.target.id === 'homePostForm') {
                e.preventDefault();
                if (!currentEmail()) return notify('Vui lòng đăng nhập.', 'error');
                const text = $('#homePostContent')?.value.trim();
                if (!text) return notify('Nhập nội dung.', 'error');
                DB.posts = DB.posts || [];
                DB.posts.unshift({ id: uid(), title: text.slice(0, 50), content: text, authorEmail: currentEmail(), status: 'approved', timestamp: now() });
                save(); notify('Đã đăng bài.'); if ($('#homePostContent')) $('#homePostContent').value = '';
                const feed = $('#homeFeed'); if (feed) feed.innerHTML = document.getElementById('page-home')?.innerHTML;
                navigate('home');
            }

            if (e.target.id === 'editBioForm') {
                e.preventDefault();
                const u = user(); if (!u) return;
                u.bio = $('#bioInput')?.value.trim() || '';
                save(); notify('Đã lưu bio.'); navigate('profile');
            }

            if (e.target.id === 'walletTransferForm') {
                e.preventDefault();
                transferWallet($('#transferTo').value, $('#transferAmount').value, $('#transferNote')?.value || '');
            }

            if (e.target.id === 'voucherForm') {
                e.preventDefault();
                redeemVoucher($('#voucherCode').value);
            }

            if (e.target.id === 'voucherAdminForm') {
                e.preventDefault();
                if (!isAdmin()) return;
                const code = ($('#voucherAdminCode').value || '').trim().toUpperCase();
                const amount = parseInt($('#voucherAdminAmount').value || '0', 10);
                const note = $('#voucherAdminNote')?.value.trim() || '';
                if (!code) return notify('Nhập mã voucher.', 'error');
                DB.vouchers = DB.vouchers || [];
                const existing = DB.vouchers.find(v => v.code === code);
                if (existing) { existing.amount = amount; existing.note = note; }
                else { DB.vouchers.unshift({ code, amount, active: true, usedBy: [], note }); }
                save(); notify(`Đã lưu voucher ${code}.`); navigate('admin');
            }
        });
                function bootUI() {
            updateUI();
            navigate('home');
            
            // Tự động bật realtime nếu đã có user
            if (currentUserEmail && !realtimeListenerActive) {
                startRealtimeListener();
            }
        }
        /* ============================================================
           CLICK DELEGATION
           ============================================================ */
        document.addEventListener('click', e => {
            const nav = e.target.closest('[data-nav]');
            if (nav) { e.preventDefault(); navigate(nav.dataset.nav); return; }
            const modal = $('#appModal');
            if (modal && !modal.classList.contains('hidden') && e.target === modal) closeModal();
        });

        window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        window.addEventListener('resize', () => { if (window.innerWidth > 1000) closeMobile(); });

        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('modalCloseBtn').onclick = closeModal;
        document.getElementById('botToggleBtn').onclick = () => { const p = $('#botPanel'); if (!p) return; const hidden = p.classList.toggle('hidden'); botState.open = !hidden; if (!botMessages.length) botMessages.push({ role: 'bot', text: 'Xin chào! Mình là Dat Dev.', time: now() }); if (!hidden) { renderBotMessages(); $('#botInput')?.focus(); } };
        document.getElementById('botCloseBtn').onclick = () => { $('#botPanel')?.classList.add('hidden'); botState.open = false; };
        document.getElementById('botSendBtn').onclick = sendDatDevMessage;
        document.getElementById('botInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendDatDevMessage(); });
        document.getElementById('burgerBtn').onclick = () => { $('#sidebar').classList.contains('mobile-open') ? closeMobile() : openMobile(); };
        document.getElementById('sidebarOverlay').onclick = closeMobile;

        /* ============================================================
           START THE APP
           ============================================================ */
        startApp();
    </script>
